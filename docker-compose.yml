version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apptrace
      POSTGRES_USER: apptrace
      POSTGRES_PASSWORD: apptrace
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
